<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cambiar contrasena | RYM Reportes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <img class="auth-logo" src="/assets/logo-remesas-mensajes.png" alt="Remesas y Mensajes" />
      <section class="auth-panel">
        <h1>Cambiar contrasena</h1>
        <form class="stack" data-auth-form="change-password">
          <label>
            Contrasena actual
            <input name="currentPassword" type="password" autocomplete="current-password" required />
          </label>
          <label>
            Nueva contrasena
            <input name="newPassword" type="password" autocomplete="new-password" required />
          </label>
          <button type="submit">Actualizar</button>
        </form>
        <p id="message" class="message" role="status" aria-live="polite"></p>
        <div class="auth-links">
          <button id="logout-button" class="link-button" type="button">Salir</button>
        </div>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
