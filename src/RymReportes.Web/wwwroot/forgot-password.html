<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuperar contrasena | RYM Reportes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <img class="auth-logo" src="/assets/logo-remesas-mensajes.png" alt="Remesas y Mensajes" />
      <section class="auth-panel">
        <h1>Recuperar contrasena</h1>
        <form class="stack" data-auth-form="forgot-password">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <button type="submit">Enviar correo</button>
        </form>
        <p id="message" class="message" role="status" aria-live="polite"></p>
        <div class="auth-links">
          <a href="/login.html">Volver al inicio</a>
        </div>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
