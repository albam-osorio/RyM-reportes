<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nueva contrasena | RYM Reportes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page" data-page="reset-password">
    <main class="auth-shell">
      <img class="auth-logo" src="/assets/logo-remesas-mensajes.png" alt="Remesas y Mensajes" />
      <section class="auth-panel">
        <h1>Nueva contrasena</h1>
        <form class="stack" data-auth-form="reset-password">
          <input id="token" name="token" type="hidden" />
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Nueva contrasena
            <input name="password" type="password" autocomplete="new-password" required />
          </label>
          <button type="submit">Guardar</button>
        </form>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
