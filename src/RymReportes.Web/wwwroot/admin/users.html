<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuarios | RYM Reportes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin-users">
    <main class="shell">
      <header class="page-header">
        <div class="brand-lockup">
          <img class="brand-logo" src="/assets/logo-remesas-mensajes.png" alt="Remesas y Mensajes" />
          <div>
            <h1>Usuarios</h1>
          </div>
        </div>
        <div class="top-actions">
          <a class="text-link" href="/">Reportes</a>
          <button id="logout-button" class="secondary" type="button">Salir</button>
        </div>
      </header>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Aprobacion</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
